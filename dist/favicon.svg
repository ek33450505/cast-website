  <!-- Agent nodes -->
  <circle cx="38" cy="32" r="5.5" fill="#00FFC2"/>
  <circle cx="56" cy="18" r="4.5" fill="#00FFC2" opacity="0.85"/>
  <circle cx="56" cy="46" r="4.5" fill="#00FFC2" opacity="0.85"/>

  <!-- Dispatch edges -->
  <line x1="43" y1="28.5" x2="52" y2="21.5" stroke="#00FFC2" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="43" y1="35.5" x2="52" y2="42.5" stroke="#00FFC2" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

  <!-- Hub to chevron connector -->
