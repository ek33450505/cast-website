<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#070A0F"/>

  <!-- Subtle dot grid texture -->
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Subtle radial glow behind logo area -->
  <radialGradient id="glow" cx="28%" cy="50%" r="35%">
    <stop offset="0%" stop-color="#00FFC2" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#00FFC2" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logomark — scaled up, left side, centered vertically -->
  <!-- Chevron (scaled ~5x from 64px base, positioned at ~160,185) -->
  <polyline points="130,235 210,315 130,395" stroke="#00FFC2" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hub node -->
  <circle cx="310" cy="315" r="28" fill="#00FFC2"/>

  <!-- Satellite nodes -->
  <circle cx="420" cy="220" r="20" fill="#00FFC2" opacity="0.8"/>
  <circle cx="420" cy="410" r="20" fill="#00FFC2" opacity="0.8"/>

  <!-- Dispatch edges hub to satellites -->
  <line x1="334" y1="292" x2="402" y2="237" stroke="#00FFC2" stroke-width="9" stroke-linecap="round" opacity="0.55"/>
  <line x1="334" y1="338" x2="402" y2="393" stroke="#00FFC2" stroke-width="9" stroke-linecap="round" opacity="0.55"/>

  <!-- Chevron tip to hub -->
  <line x1="212" y1="315" x2="282" y2="315" stroke="#00FFC2" stroke-width="9" stroke-linecap="round" opacity="0.45"/>

  <!-- "CAST" wordmark -->
  <text x="510" y="355" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace" font-size="148" font-weight="700" fill="#00FFC2" letter-spacing="-4">CAST</text>

  <!-- Tagline -->
  <text x="510" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#88A3D6">A local-first multi-agent framework for Claude Code</text>

  <!-- Divider line -->
  <line x1="510" y1="455" x2="1120" y2="455" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <!-- Stats strip -->
  <text x="510" y="495" font-family="'SF Mono', 'Fira Code', ui-monospace, monospace" font-size="20" font-weight="400" fill="#5a6c8a" letter-spacing="1">17 Agents · 357 Tests · 13 Repos · MIT License</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="3" fill="#00FFC2" opacity="0.25"/>
</svg>
