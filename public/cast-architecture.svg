<svg width="900" viewBox="0 0 900 1020" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CAST architecture diagram</title>
  <desc>Full pipeline from user prompt through CLAUDE.md dispatch, hooks, agent execution, post-chain protocol, stop hook, database, and dashboard UI.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th-purple { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts-purple { font-size: 12px; fill: #534AB7; }
      .th-amber  { font-size: 14px; font-weight: 500; fill: #633806; }
      .ts-amber  { font-size: 12px; fill: #854F0B; }
      .th-teal   { font-size: 14px; font-weight: 500; fill: #085041; }
      .ts-teal   { font-size: 12px; fill: #0F6E56; }
      .th-blue   { font-size: 14px; font-weight: 500; fill: #0C447C; }
      .ts-blue   { font-size: 12px; fill: #185FA5; }
      .th-coral  { font-size: 14px; font-weight: 500; fill: #712B13; }
      .ts-coral  { font-size: 12px; fill: #993C1D; }
      .th-gray   { font-size: 14px; font-weight: 500; fill: #444441; }
      .ts-gray   { font-size: 12px; fill: #5F5E5A; }
      .ts-annot  { font-size: 11px; fill: #888780; }
    </style>
  </defs>

  <!-- background -->
  <rect width="900" height="1020" fill="#ffffff"/>

  <!-- ── USER PROMPT ── -->
  <rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th-gray" x="340" y="42" text-anchor="middle" dominant-baseline="central">User prompt</text>

  <line x1="340" y1="64" x2="340" y2="90" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ── CLAUDE.md DISPATCH ── -->
  <rect x="140" y="90" width="400" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="th-purple" x="340" y="112" text-anchor="middle" dominant-baseline="central">CLAUDE.md dispatch table</text>
  <text class="ts-purple" x="340" y="132" text-anchor="middle" dominant-baseline="central">17-row routing — model picks specialist agent</text>

  <line x1="340" y1="146" x2="340" y2="172" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ── PRE-TOOL HOOKS ── -->
  <rect x="140" y="172" width="400" height="100" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text class="th-amber" x="340" y="198" text-anchor="middle" dominant-baseline="central">PreToolUse hooks</text>
  <text class="ts-amber" x="200" y="222" dominant-baseline="central">pre-tool-guard.sh</text>
  <text class="ts-amber" x="200" y="242" dominant-baseline="central">cast-audit-hook.sh</text>
  <text class="ts-amber" x="200" y="262" dominant-baseline="central">cast-headless-guard</text>

  <line x1="540" y1="222" x2="572" y2="222" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" fill="none"/>
  <text class="ts-annot" x="576" y="226" dominant-baseline="central">blocks raw git commit/push</text>
  <line x1="540" y1="242" x2="572" y2="242" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" fill="none"/>
  <text class="ts-annot" x="576" y="246" dominant-baseline="central">logs file modifications</text>
  <line x1="540" y1="262" x2="572" y2="262" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" fill="none"/>
  <text class="ts-annot" x="576" y="266" dominant-baseline="central">auto-answers AskUser</text>

  <line x1="340" y1="272" x2="340" y2="298" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ── AGENT DISPATCH ── -->
  <rect x="140" y="298" width="400" height="80" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th-teal" x="340" y="324" text-anchor="middle" dominant-baseline="central">Agent tool dispatch</text>
  <text class="ts-teal" x="340" y="346" text-anchor="middle" dominant-baseline="central">Specialist agent runs</text>
  <text class="ts-teal" x="340" y="364" text-anchor="middle" dominant-baseline="central">SubagentStart hook fires on spawn</text>

  <line x1="540" y1="364" x2="572" y2="364" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" fill="none"/>
  <text class="ts-annot" x="576" y="368" dominant-baseline="central">emits task_claimed → cast.db</text>

  <line x1="340" y1="378" x2="340" y2="404" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ── POST-TOOL HOOKS ── -->
  <rect x="140" y="404" width="400" height="56" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text class="th-amber" x="340" y="426" text-anchor="middle" dominant-baseline="central">PostToolUse hooks</text>
  <text class="ts-amber" x="200" y="448" dominant-baseline="central">post-tool-hook.sh</text>

  <line x1="540" y1="448" x2="572" y2="448" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" fill="none"/>
  <text class="ts-annot" x="576" y="452" dominant-baseline="central">injects [CAST-REVIEW] after writes</text>

  <line x1="340" y1="460" x2="340" y2="486" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ── POST-CHAIN PROTOCOL ── -->
  <rect x="140" y="486" width="400" height="100" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="th-blue" x="340" y="512" text-anchor="middle" dominant-baseline="central">Post-chain protocol</text>
  <text class="ts-blue" x="200" y="536" dominant-baseline="central">code changed?</text>
  <text class="ts-blue" x="220" y="556" dominant-baseline="central">yes → code-reviewer → commit → push</text>
  <text class="ts-blue" x="220" y="574" dominant-baseline="central">no  → done</text>

  <line x1="340" y1="586" x2="340" y2="612" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ── STOP HOOK ── -->
  <rect x="140" y="612" width="400" height="56" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text class="th-coral" x="340" y="634" text-anchor="middle" dominant-baseline="central">Stop hook</text>
  <text class="ts-coral" x="200" y="654" dominant-baseline="central">cast-session-end.sh</text>

  <line x1="540" y1="654" x2="572" y2="654" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" fill="none"/>
  <text class="ts-annot" x="576" y="658" dominant-baseline="central">archival, DB pruning, memory sync</text>

  <line x1="340" y1="668" x2="340" y2="694" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ── cast.db ── -->
  <rect x="140" y="694" width="400" height="88" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th-gray" x="340" y="720" text-anchor="middle" dominant-baseline="central">cast.db</text>
  <rect x="172" y="734" width="158" height="28" rx="4" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="ts-gray" x="251" y="748" text-anchor="middle" dominant-baseline="central">sessions · agent_runs</text>
  <rect x="350" y="734" width="158" height="28" rx="4" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="ts-gray" x="429" y="748" text-anchor="middle" dominant-baseline="central">routing_events · memories</text>

  <line x1="340" y1="782" x2="340" y2="808" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ── DASHBOARD ── -->
  <rect x="140" y="808" width="400" height="108" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="th-purple" x="340" y="832" text-anchor="middle" dominant-baseline="central">claude-code-dashboard</text>
  <text class="ts-purple" x="340" y="852" text-anchor="middle" dominant-baseline="central">React UI · port 5173</text>

  <!-- route pills row 1 -->
  <rect x="164" y="864" width="80" height="20" rx="10" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts-purple" x="204" y="874" text-anchor="middle" dominant-baseline="central">/activity</text>
  <rect x="256" y="864" width="80" height="20" rx="10" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts-purple" x="296" y="874" text-anchor="middle" dominant-baseline="central">/sessions</text>
  <rect x="348" y="864" width="80" height="20" rx="10" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts-purple" x="388" y="874" text-anchor="middle" dominant-baseline="central">/analytics</text>
  <rect x="440" y="864" width="80" height="20" rx="10" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts-purple" x="480" y="874" text-anchor="middle" dominant-baseline="central">/agents</text>

  <!-- route pills row 2 -->
  <rect x="200" y="890" width="80" height="20" rx="10" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts-purple" x="240" y="900" text-anchor="middle" dominant-baseline="central">/memory</text>
  <rect x="300" y="890" width="120" height="20" rx="10" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts-purple" x="360" y="900" text-anchor="middle" dominant-baseline="central">/token-spend</text>

  <!-- ── LEGEND ── -->
  <rect x="40" y="938" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts-annot" x="58" y="944" dominant-baseline="central">Dispatch / UI</text>
  <rect x="140" y="938" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text class="ts-annot" x="158" y="944" dominant-baseline="central">Hook layer</text>
  <rect x="230" y="938" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="ts-annot" x="248" y="944" dominant-baseline="central">Agent execution</text>
  <rect x="340" y="938" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="ts-annot" x="358" y="944" dominant-baseline="central">Post-chain logic</text>
  <rect x="455" y="938" width="12" height="12" rx="2" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text class="ts-annot" x="473" y="944" dominant-baseline="central">Stop / cleanup</text>

  <text class="ts-annot" x="340" y="978" text-anchor="middle">cast-site-iota.vercel.app</text>
</svg>
